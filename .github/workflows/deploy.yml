name: Deploy Bhiwadi to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            echo "🚀 Starting Bhiwadi deployment..."

            cd /var/www/bhiwadi-realestate

            echo "📥 Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            echo "📦 Backend install..."
            cd backend
            npm install --omit=dev

            echo "🔁 Restart backend..."
            pm2 restart bhiwadi-backend --update-env

            echo "📦 Frontend install..."
            cd ../frontend
            npm install

            echo "🏗️ Frontend build..."
            npm run build

            echo "🔁 Restart frontend..."
            pm2 restart bhiwadi-frontend --update-env

            echo "💾 Save PM2..."
            pm2 save

            echo "✅ Bhiwadi deployment completed!"
